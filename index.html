<body>
  <script>
    try {
      const localData = localStorage.getItem('appState') || localStorage.getItem('app_state');
      if (localData) {
        const parsed = JSON.parse(localData);
        if (parsed.settings && parsed.settings.darkMode) {
          document.body.classList.add('dark-mode');
        }
      }
    } catch (e) {
      console.error("Theme quick-check error:", e);
    }
  </script>

  <script defer>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => {
            console.log('ServiceWorker registered with scope:', reg.scope);
            
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('New update available! Reloading...');
                  window.location.reload();
                }
              });
            });
          })
          .catch((err) => console.log('ServiceWorker registration failed:', err));
      });
      
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) {
          window.location.reload();
          refreshing = true;
        }
      });
    }
  </script>
